<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#0b1020">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="GeoSpark">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="GeoSpark: a multi-mode geography progression game.">
  <title>GeoSpark 3</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icon-192.png">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://flagcdn.com">
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>
  <main class="app" id="app">
    <section class="screen boot-screen" id="boot-screen">
      <img class="brand-mark" src="icon-192.png" alt="">
      <div class="brand-title">GeoSpark</div>
      <div class="muted">Loading passport...</div>
    </section>

    <section class="screen onboarding hidden" id="onboarding-screen" aria-labelledby="onboarding-title">
      <img class="brand-mark" src="icon-192.png" alt="">
      <h1 id="onboarding-title">GeoSpark</h1>
      <p class="screen-copy">Create your passport and choose the shape of your journey.</p>
      <label class="field-label" for="player-name">Name</label>
      <input id="player-name" class="text-field" type="text" maxlength="18" autocomplete="nickname" placeholder="Explorer name">
      <div class="choice-grid" id="archetype-grid">
        <button class="choice-card selected" type="button" data-archetype="historian">
          <span class="choice-title">The Historian</span>
          <span class="choice-copy">15 sparks per level, 7 levels per stage.</span>
        </button>
        <button class="choice-card" type="button" data-archetype="pilot">
          <span class="choice-title">The Pilot</span>
          <span class="choice-copy">5 sparks per level, 20 levels per stage.</span>
        </button>
      </div>
      <button class="primary-btn" id="create-passport-btn" type="button">Create Passport</button>
    </section>

    <section class="screen menu-screen hidden" id="menu-screen" aria-labelledby="menu-title">
      <header class="menu-header">
        <div>
          <div class="eyebrow">Passport</div>
          <h1 id="menu-title">Welcome, <span id="menu-name">Explorer</span></h1>
        </div>
        <img class="mini-mark" src="icon-192.png" alt="">
      </header>

      <div class="globe-shell" aria-hidden="true">
        <canvas id="globe-canvas" width="320" height="320"></canvas>
        <div class="gs-core">GS</div>
      </div>

      <div class="passport-strip">
        <div><span id="menu-stage">Europe</span><small>Stage</small></div>
        <div><span id="menu-sparks">0</span><small>GeoSparks</small></div>
        <div><span id="menu-airmiles">0</span><small>AirMiles</small></div>
      </div>

      <div class="mode-list">
        <button class="mode-btn" id="journey-btn" type="button">
          <span>Journey</span><small>Campaign progression</small>
        </button>
        <button class="mode-btn" id="challenge-btn" type="button">
          <span>Challenge</span><small>Timed arcade run</small>
        </button>
        <button class="mode-btn locked" id="zen-btn" type="button">
          <span id="zen-label">Zen Locked</span><small id="zen-copy">Complete Asia or buy for 5,000 AirMiles</small>
        </button>
      </div>

      <div class="stage-track" id="stage-track"></div>
      <div class="version-label" id="menu-version">GeoSpark v0.3.0</div>
    </section>

    <section class="screen game-screen hidden" id="game-screen" aria-live="polite">
      <header class="game-hud" id="game-hud">
        <button class="icon-btn" id="back-menu-btn" type="button" aria-label="Back to menu">‹</button>
        <div class="hud-center">
          <div class="hud-mode" id="hud-mode">Journey</div>
          <div class="progress-track" id="journey-progress-track"><div id="journey-progress-fill"></div></div>
        </div>
        <button class="icon-btn pause-control" id="pause-btn" type="button" aria-label="Pause game">Ⅱ</button>
      </header>

      <div class="status-row" id="status-row">
        <div class="timer-chip" id="timer-chip">
          <svg viewBox="0 0 44 44" aria-hidden="true">
            <circle class="timer-track" cx="22" cy="22" r="18"></circle>
            <circle class="timer-fill" id="timer-fill" cx="22" cy="22" r="18"></circle>
          </svg>
          <span id="timer-text">18</span>
        </div>
        <div class="hud-stats" id="hud-stats"></div>
        <div class="lives-chip" id="lives-chip" aria-label="Lives"><span id="lives-text">♥♥♥</span></div>
      </div>

      <div class="zen-title hidden" id="zen-title"></div>

      <section class="question-panel" id="question-panel">
        <div class="question-badge" id="question-badge">Flag to Country</div>
        <div class="flag-display" id="flag-display"></div>
        <h2 id="question-text">Question</h2>
        <p id="question-subtitle"></p>
      </section>

      <div class="answer-grid" id="answer-grid"></div>

      <div class="tool-row" id="tool-row">
        <button class="secondary-btn" id="auto-correct-btn" type="button">Auto-Correct · 25 GeoSparks</button>
        <button class="secondary-btn" id="skip-level-btn" type="button">Skip Level · 250 AirMiles</button>
      </div>

      <div class="feedback-line" id="feedback-line"></div>

      <div class="pause-overlay hidden" id="pause-overlay">
        <div class="pause-panel">
          <h2>Paused</h2>
          <p>The timer is frozen.</p>
          <button class="primary-btn" id="resume-btn" type="button">Resume</button>
        </div>
      </div>
    </section>

    <section class="screen result-screen hidden" id="result-screen">
      <h1 id="result-title">Run Complete</h1>
      <p id="result-copy" class="screen-copy"></p>
      <div class="result-score" id="result-score">0</div>
      <div class="version-label" id="result-version">GeoSpark v0.3.0</div>
      <button class="primary-btn" id="result-menu-btn" type="button">Return to Menu</button>
    </section>
  </main>

  <script src="src/app.js" type="module"></script>
</body>
</html>
